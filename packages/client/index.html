<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="/manifest.json" />
  <title>无极</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #0d1117;
      overflow: hidden;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    /* 全屏背景装饰 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse 40% 50% at 15% 30%, rgba(28, 33, 40, 0.6) 0%, transparent 60%),
        radial-gradient(ellipse 35% 45% at 85% 70%, rgba(28, 33, 40, 0.5) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 90%, rgba(28, 33, 40, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse 30% 35% at 75% 20%, rgba(28, 33, 40, 0.5) 0%, transparent 50%),
        radial-gradient(ellipse 25% 30% at 25% 80%, rgba(28, 33, 40, 0.4) 0%, transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    /* 游戏容器 - 绝对居中 */
    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }

    /* 确保 canvas 居中 */
    #game-container canvas {
      display: block;
      margin: auto;
    }

    /* 竖屏提示遮罩 */
    #orientation-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(13, 17, 23, 0.98);
      z-index: 99999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    #orientation-overlay .icon {
      font-size: 64px;
      animation: rotate-phone 1.5s ease-in-out infinite;
    }

    @keyframes rotate-phone {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-90deg); }
    }

    #orientation-overlay .title {
      font-size: 24px;
      color: #f0e6d3;
      font-weight: bold;
    }

    #orientation-overlay .subtitle {
      font-size: 14px;
      color: #8b949e;
    }

    /* 仅在横屏时显示遮罩 */
    @media screen and (orientation: landscape) {
      #orientation-overlay {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- 竖屏提示 -->
  <div id="orientation-overlay">
    <div class="icon">📱</div>
    <div class="title">请竖屏游玩</div>
    <div class="subtitle">旋转您的设备以获得最佳体验</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
